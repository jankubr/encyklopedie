<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cesta Ninja</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ninja">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* === RESET & BASE === */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #1f2b47;
      --accent-red: #e63946;
      --accent-gold: #ffd700;
      --accent-green: #06d6a0;
      --accent-orange: #f4a261;
      --text-white: #ffffff;
      --text-cream: #f0e6d3;
      --text-muted: #8899bb;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-white);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 20px;
      line-height: 1.8;
      letter-spacing: 0.3px;
      word-spacing: 2px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === SCREENS === */
    .screen { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease; flex: 1; }
    .screen.active { display: flex; }

    /* === BUTTONS === */
    .btn {
      display: inline-block;
      padding: 16px 36px;
      border: none;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
      text-align: center;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.97); }

    .btn-red {
      background: linear-gradient(135deg, var(--accent-red), #c1121f);
      color: white;
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.4);
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--accent-gold), #e6ac00);
      color: #1a1a2e;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
    }
    .btn-back {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      color: var(--text-cream);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.2); }

    /* === HOME SCREEN === */
    .home-title {
      font-size: 42px;
      font-weight: 800;
      margin-top: 40px;
      background: linear-gradient(135deg, var(--accent-red), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home-subtitle {
      color: var(--text-muted);
      font-size: 18px;
      margin-top: 4px;
      margin-bottom: 30px;
    }

    /* CSS Ninja Character */
    .ninja-character {
      position: relative;
      width: 120px;
      height: 160px;
      margin: 20px 0 40px;
      animation: float 3s ease-in-out infinite;
    }
    .ninja-head {
      width: 70px;
      height: 70px;
      background: #2d2d2d;
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .ninja-eyes {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      display: flex;
      justify-content: space-between;
    }
    .ninja-eye {
      width: 12px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: blink 4s infinite;
    }
    .ninja-headband {
      position: absolute;
      top: 20px;
      left: -4px;
      width: 78px;
      height: 12px;
      background: var(--accent-red);
      border-radius: 4px;
      z-index: 3;
    }
    .ninja-headband::after {
      content: '';
      position: absolute;
      right: -16px;
      top: 2px;
      width: 20px;
      height: 8px;
      background: var(--accent-red);
      border-radius: 0 4px 4px 0;
      transform: rotate(15deg);
    }
    .ninja-body {
      width: 60px;
      height: 70px;
      background: #2d2d2d;
      margin: -8px auto 0;
      border-radius: 8px 8px 20px 20px;
      position: relative;
    }
    .ninja-belt {
      position: absolute;
      top: 20px;
      left: -2px;
      width: 64px;
      height: 8px;
      background: var(--accent-gold);
      border-radius: 2px;
    }
    .ninja-arms {
      position: absolute;
      top: 5px;
      left: -20px;
      width: 100px;
      height: 20px;
    }
    .ninja-arm {
      position: absolute;
      width: 24px;
      height: 12px;
      background: #2d2d2d;
      border-radius: 6px;
      top: 0;
    }
    .ninja-arm.left { left: 0; transform: rotate(-20deg); }
    .ninja-arm.right { right: 0; transform: rotate(20deg); }
    .ninja-star {
      position: absolute;
      right: -30px;
      top: -10px;
      font-size: 24px;
      animation: spin 3s linear infinite;
    }

    .home-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

    /* === TOPICS SCREEN === */
    .topics-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 24px;
      text-align: center;
    }
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
    }
    .topic-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
    }
    .topic-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .topic-card .emoji { font-size: 42px; display: block; margin-bottom: 10px; }
    .topic-card .title { font-size: 16px; font-weight: 700; color: var(--text-cream); }

    .quiz-vo-btn {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      color: var(--text-cream);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .quiz-vo-btn:hover { background: rgba(255,255,255,0.14); }
    .quiz-vo-btn.playing { background: rgba(231, 76, 60, 0.2); border-color: rgba(231, 76, 60, 0.5); }

    .topic-card:nth-child(1) { border-color: #e63946; }
    .topic-card:nth-child(2) { border-color: #6c63ff; }
    .topic-card:nth-child(3) { border-color: #06d6a0; }
    .topic-card:nth-child(4) { border-color: #f4a261; }
    .topic-card:nth-child(5) { border-color: #4ecdc4; }
    .topic-card:nth-child(6) { border-color: #ff6b9d; }
    .topic-card:nth-child(7) { border-color: #ffd700; }

    /* === LESSON SCREEN === */
    .lesson-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }
    .lesson-emoji {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .lesson-content {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      margin-bottom: 20px;
    }
    .lesson-content p {
      margin-bottom: 16px;
      color: var(--text-cream);
      font-size: 21px;
      line-height: 2;
    }
    .lesson-content p:last-child { margin-bottom: 0; }
    .lesson-divider {
      text-align: center;
      color: var(--accent-red);
      font-size: 14px;
      margin: 12px 0;
      opacity: 0.5;
    }
    .lesson-illustration {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }
    .lesson-illustration svg {
      max-width: 480px;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }
    /* Exercise cards */
    .exercise-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      width: 100%;
      border: 2px solid rgba(255,255,255,0.08);
      animation: fadeIn 0.4s ease;
    }
    .exercise-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .exercise-anim {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
    }
    .exercise-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-white);
    }
    .exercise-difficulty {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.7;
    }
    .exercise-body p {
      color: var(--text-cream);
      font-size: 19px;
      line-height: 1.9;
      margin-bottom: 10px;
    }
    .exercise-steps {
      list-style: none;
      padding: 0;
      margin: 12px 0 0 0;
    }
    .exercise-steps li {
      color: var(--text-cream);
      font-size: 18px;
      line-height: 1.8;
      padding: 6px 0 6px 32px;
      position: relative;
    }
    .exercise-steps li::before {
      content: attr(data-step);
      position: absolute;
      left: 0;
      top: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-gold);
    }

    /* Exercise animations */
    @keyframes balanceRock {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }
    @keyframes sneakMove {
      0%, 100% { transform: translateX(0); opacity: 1; }
      40% { transform: translateX(12px); opacity: 0.7; }
      80% { transform: translateX(24px); opacity: 0.4; }
    }
    @keyframes rollSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes eyeBlink {
      0%, 80%, 100% { transform: scale(1); }
      90% { transform: scale(1.3); }
    }
    @keyframes statueFade {
      0%, 85%, 100% { opacity: 1; }
      90% { opacity: 0.3; }
      95% { opacity: 1; }
    }
    @keyframes throwArc {
      0% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(14px, -18px) rotate(180deg); }
      100% { transform: translate(28px, 0) rotate(360deg); }
    }
    @keyframes catStep {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-6px); }
      50% { transform: translateY(0); }
      75% { transform: translateY(-6px); }
    }

    /* Voiceover play button */
    .voiceover-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      color: var(--text-cream);
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 17px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 14px;
      transition: all 0.2s;
    }
    .voiceover-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
    }
    .voiceover-btn.playing {
      background: rgba(231, 76, 60, 0.2);
      border-color: rgba(231, 76, 60, 0.5);
      color: #e74c3c;
    }
    .voiceover-btn .vo-icon {
      font-size: 20px;
      transition: transform 0.2s;
    }
    .voiceover-btn.playing .vo-icon {
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    /* Voiceover progress bar */
    .vo-progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .vo-progress.active { display: block; }
    .vo-progress-fill {
      height: 100%;
      background: var(--accent-gold);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s linear;
    }

    .anim-balance { animation: balanceRock 2s ease-in-out infinite; }
    .anim-sneak { animation: sneakMove 3s ease-in-out infinite; }
    .anim-roll { animation: rollSpin 2s linear infinite; }
    .anim-eye { animation: eyeBlink 3s ease-in-out infinite; }
    .anim-statue { animation: statueFade 5s ease-in-out infinite; }
    .anim-throw { animation: throwArc 1.5s ease-in-out infinite; }
    .anim-cat { animation: catStep 1.5s ease-in-out infinite; }

    .lesson-fun-fact {
      background: rgba(255, 215, 0, 0.1);
      border-left: 4px solid var(--accent-gold);
      padding: 16px 20px;
      border-radius: 0 12px 12px 0;
      margin-top: 16px;
      width: 100%;
    }
    .lesson-fun-fact .label {
      font-weight: 700;
      color: var(--accent-gold);
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .lesson-fun-fact p {
      color: var(--text-cream);
      margin: 0;
    }

    /* === QUIZ SCREEN === */
    .quiz-header {
      width: 100%;
      margin-bottom: 24px;
    }
    .quiz-progress-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-align: center;
    }
    .quiz-progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
      border-radius: 5px;
      transition: width 0.5s ease;
    }
    .quiz-question {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin: 20px 0 30px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quiz-options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .quiz-option {
      width: 100%;
      padding: 20px 24px;
      background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      color: var(--text-white);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: left;
    }
    .quiz-option:hover {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
    }
    .quiz-option.correct {
      background: rgba(6, 214, 160, 0.2);
      border-color: var(--accent-green);
      animation: pulse 0.5s;
    }
    .quiz-option.wrong {
      background: rgba(244, 162, 97, 0.2);
      border-color: var(--accent-orange);
      animation: shake 0.5s;
    }
    .quiz-option.reveal-correct {
      background: rgba(6, 214, 160, 0.15);
      border-color: var(--accent-green);
    }
    .quiz-option:disabled { cursor: default; }

    .quiz-feedback {
      margin-top: 20px;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      animation: fadeIn 0.3s;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quiz-feedback.correct {
      background: rgba(6, 214, 160, 0.15);
      color: var(--accent-green);
    }
    .quiz-feedback.wrong {
      background: rgba(244, 162, 97, 0.15);
      color: var(--accent-orange);
    }
    .quiz-next-btn {
      margin-top: 20px;
      animation: fadeIn 0.3s;
    }

    /* === RESULTS SCREEN === */
    .results-title {
      font-size: 32px;
      font-weight: 800;
      margin-top: 40px;
      margin-bottom: 10px;
    }
    .results-stars {
      display: flex;
      gap: 16px;
      margin: 30px 0;
    }
    .result-star {
      font-size: 56px;
      opacity: 0.2;
      transform: scale(0.5);
      transition: all 0.5s ease;
    }
    .result-star.earned {
      opacity: 1;
      transform: scale(1);
      animation: starIn 0.6s ease;
    }
    .result-star:nth-child(2).earned { animation-delay: 0.2s; }
    .result-star:nth-child(3).earned { animation-delay: 0.4s; }

    .results-message {
      font-size: 20px;
      color: var(--text-cream);
      text-align: center;
      margin-bottom: 16px;
      max-width: 400px;
    }
    .results-score {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 30px;
    }
    .results-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

    /* background stars decoration */
    .bg-stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .bg-star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    /* === ANIMATIONS === */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    @keyframes starIn {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 0.8; }
    }

    /* === RESPONSIVE === */
    @media (max-width: 480px) {
      .home-title { font-size: 32px; }
      .topics-title { font-size: 26px; }
      .quiz-question { font-size: 20px; }
      .btn { padding: 14px 28px; font-size: 18px; }
      .topic-card { padding: 18px 12px; }
      .topic-card .emoji { font-size: 34px; }
      .lesson-content { padding: 20px; }
    }
    @media (min-width: 500px) {
      .topics-grid { grid-template-columns: repeat(3, 1fr); }
    }
    /* === LANGUAGE SWITCHER === */
    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      color: var(--text-cream);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-btn:hover {
      background: rgba(255,255,255,0.12);
    }
    .lang-btn.active {
      background: rgba(255, 215, 0, 0.15);
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Background stars -->
  <div class="bg-stars" id="bgStars"></div>

  <div class="container">

    <!-- SCREEN: HOME -->
    <div id="screen-home" class="screen active">
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" onclick="setLang('cs')">🇨🇿 Čeština</button>
        <button class="lang-btn" onclick="setLang('pt')">🇵🇹 Português</button>
        <button class="lang-btn" onclick="setLang('es')">🇪🇸 Español</button>
      </div>
      <h1 class="home-title" id="homeTitle">Cesta Ninja</h1>
      <p class="home-subtitle" id="homeSubtitle">Staň se mistrem ninjutsu!</p>

      <div class="ninja-character">
        <div class="ninja-head">
          <div class="ninja-headband"></div>
          <div class="ninja-eyes">
            <div class="ninja-eye"></div>
            <div class="ninja-eye"></div>
          </div>
        </div>
        <div class="ninja-body">
          <div class="ninja-belt"></div>
          <div class="ninja-arms">

      let ctx;
      function getCtx() {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        return ctx;
      }
      function resumeCtx() {
        if (ctx && ctx.state === 'suspended') ctx.resume();
      }
      // Utility: play a sequence of tones
      function playTones(tones, type = 'sine') {
        const c = getCtx();
        const master = c.createGain();
        master.gain.value = 0.18;
        master.connect(c.destination);
        let t = c.currentTime;
        tones.forEach(([freq, dur]) => {
          const osc = c.createOscillator();
          const env = c.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          env.gain.setValueAtTime(0.5, t);
          env.gain.exponentialRampToValueAtTime(0.01, t + dur);
          osc.connect(env);
          env.connect(master);
          osc.start(t);
          osc.stop(t + dur);
          t += dur * 0.7;
        });
      }
      return {
        // Short click/tap
        click() {
          resumeCtx();
          playTones([[880, 0.06], [1100, 0.05]], 'sine');
        },
        // Screen transition swoosh
        swoosh() {
          resumeCtx();
          const c = getCtx();
          const osc = c.createOscillator();
          const gain = c.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(200, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, c.currentTime + 0.15);
          gain.gain.setValueAtTime(0.12, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.2);
          osc.connect(gain);
          gain.connect(c.destination);
          osc.start();
          osc.stop(c.currentTime + 0.2);
        },
        // Correct answer — happy ascending melody
        correct() {
          resumeCtx();
          playTones([[523, 0.12], [659, 0.12], [784, 0.12], [1047, 0.2]], 'sine');
        },
        // Wrong answer — low descending buzz
        wrong() {
          resumeCtx();
          playTones([[330, 0.2], [220, 0.3]], 'square');
        },
        // Quiz complete fanfare
        fanfare() {

        star() {
          resumeCtx();
          playTones([[1200, 0.08], [1500, 0.08], [1800, 0.15]], 'sine');
        }
      };

      const cache = {};

      function getPath(filename) {
        return lang === 'cs' ? `audio/${filename}` : `audio/${lang}/${filename}`;
      }

      function getAudio(filename) {
        const p = getPath(filename);
        if (!cache[p]) cache[p] = new Audio(p);
        return cache[p];
      }

      function playFile(filename, onEnd) {
        Voiceover.stop();
        currentAudio = getAudio(filename);
        currentAudio.currentTime = 0;
        onEndCallback = onEnd || null;
        currentAudio.onended = () => {
          const cb = onEndCallback;
          currentAudio = null;
          onEndCallback = null;
          if (cb) cb();
        };
        currentAudio.play().catch(() => {});
        return currentAudio;
      }

      const Voiceover = {
        setLang(l) { lang = l; },
        play(exerciseIndex) {
          if (exerciseIndex < 0 || exerciseIndex >= exerciseFileNames.length) return;
          return playFile(exerciseFileNames[exerciseIndex]);
        },
        playTopic(index, onEnd) { return playFile(`topic-${index}.mp3`, onEnd); },
        playQuiz(questionIndex) { return playFile(`quiz-q${questionIndex}.mp3`); },
        playReadMore() { return playFile('read-more.mp3'); },
        stop() {
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio.onended = null;
            currentAudio = null;
            onEndCallback = null;
          }
        },
        isPlaying() { return currentAudio && !currentAudio.paused; },
        getCurrent() { return currentAudio; }
      };
      return Voiceover;

    // === STATE ===
    let currentScreen = 'screen-home';

    // === NAVIGATION ===
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const screen = document.getElementById(screenId);
      screen.classList.add('active');
      // Re-trigger animation
      screen.style.animation = 'none';
      screen.offsetHeight; // force reflow
      screen.style.animation = '';
      currentScreen = screenId;
      SFX.swoosh();
      // Stop voiceover when leaving lesson
      Voiceover.stop();
    }

    // === TOPICS RENDERING ===
    function renderTopics() {
      const grid = document.getElementById('topicsGrid');
      grid.innerHTML = '';
      lessons.forEach((lesson, i) => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.onclick = () => { SFX.click(); renderLesson(i); };
        const translatedTitle = T('lessons')[i].title;
        card.innerHTML = `<span class="emoji">${lesson.emoji}</span><span class="title">${translatedTitle}</span>`;
        grid.appendChild(card);
      });
    }

    // === LESSON RENDERING ===
    function renderLesson(index) {
      const lesson = lessons[index];
      const tLesson = T('lessons')[index];
      const lessonIllustrations = illustrations[index] || [];
      document.getElementById('lessonEmoji').textContent = lesson.emoji;
      document.getElementById('lessonTitle').textContent = tLesson.title;
      document.getElementById('funFactLabel').textContent = T('funFactLabel');

      const content = document.getElementById('lessonContent');
      content.innerHTML = '';

      // Exercise lesson — special card layout
      if (lesson.isExercise && lesson.exercises) {
        const tExercises = T('exercises');
        const diffMap = { '⭐ Začátečník': 'beginner', '⭐⭐ Pokročilý': 'intermediate', '⭐⭐⭐ Mistr': 'master' };
        lesson.exercises.forEach((ex, i) => {
          const tEx = tExercises[i];
          const card = document.createElement('div');
          card.className = 'exercise-card';
          card.style.borderColor = ex.color + '33';
          card.style.animationDelay = (i * 0.1) + 's';

          const diffKey = diffMap[ex.difficulty] || 'beginner';
          const translatedDiff = T('difficulties')[diffKey];
          const stepsHtml = tEx.steps.map((s, si) =>
            `<li data-step="${si + 1}">${s}</li>`
          ).join('');

          card.innerHTML = `
            <div class="exercise-header">
              <div class="exercise-anim ${ex.anim}" style="background:${ex.color}18; border: 2px solid ${ex.color}44">
                ${ex.emoji}
              </div>
              <div>
                <div class="exercise-title" style="color:${ex.color}">${tEx.title}</div>
                <div class="exercise-difficulty">${translatedDiff}</div>
              </div>
            </div>
            <div class="exercise-body">
              <p>${tEx.description}</p>
              <ol class="exercise-steps">${stepsHtml}</ol>
              <button class="voiceover-btn" id="vo-btn-${i}" onclick="toggleVoiceover(${i}, this)">
                <span class="vo-icon">🔊</span> ${T('listen')}
              </button>
              <div class="vo-progress" id="vo-progress-${i}">
                <div class="vo-progress-fill" id="vo-fill-${i}"></div>
              </div>
            </div>
          `;
          content.appendChild(card);
        });

        document.getElementById('funFactText').textContent = tLesson.funFact;
        showScreen('screen-lesson');
        // Auto-play topic title voiceover for exercise lesson
        setTimeout(() => {
          if (currentScreen === 'screen-lesson') {
            Voiceover.playTopic(index);
          }
        }, 600);
        return;
      }

      // Regular lesson — illustrations + paragraphs
      const paragraphs = tLesson.paragraphs || [];
      if (lessonIllustrations[0]) {
        const illDiv = document.createElement('div');
        illDiv.className = 'lesson-illustration';
        illDiv.innerHTML = lessonIllustrations[0];
        content.appendChild(illDiv);
      }

      paragraphs.forEach((p, i) => {
        const para = document.createElement('p');
        para.textContent = p;
        content.appendChild(para);

        if (i === 0 && lessonIllustrations[1]) {
          const illDiv = document.createElement('div');
          illDiv.className = 'lesson-illustration';
          illDiv.innerHTML = lessonIllustrations[1];
          content.appendChild(illDiv);
        } else if (i < paragraphs.length - 1) {
          const divider = document.createElement('div');
          divider.className = 'lesson-divider';
          divider.textContent = '✦ ✦ ✦';
          content.appendChild(divider);
        }
      });

      document.getElementById('funFactText').textContent = tLesson.funFact;
      showScreen('screen-lesson');

      // Auto-play topic title voiceover + "read more" prompt
      setTimeout(() => {
        if (currentScreen === 'screen-lesson') {
          Voiceover.playTopic(index, () => {
            Voiceover.playReadMore();
          });
        }
      }, 600);
    }

    // === QUIZ ENGINE ===
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz() {
      quizQuestions = shuffle(T('questions'));
      currentQuestionIndex = 0;
      score = 0;
      answering = false;
      showScreen('screen-quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q = quizQuestions[currentQuestionIndex];
      const total = quizQuestions.length;

      document.getElementById('quizProgressLabel').textContent = T('questionOf')(currentQuestionIndex + 1, total);
      document.getElementById('quizProgressFill').style.width = `${((currentQuestionIndex) / total) * 100}%`;
      document.getElementById('quizQuestion').textContent = q.question;
      document.getElementById('quizFeedback').style.display = 'none';
      document.getElementById('quizVoBtn').classList.remove('playing');

      const optionsEl = document.getElementById('quizOptions');
      optionsEl.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => { SFX.click(); checkAnswer(i); };
        optionsEl.appendChild(btn);
      });
      setTimeout(() => { if (currentScreen === 'screen-quiz') playQuizVO(); }, 500);
    }

    function playQuizVO() {
      const q = quizQuestions[currentQuestionIndex];
      const origIndex = T('questions').indexOf(q);
      if (origIndex >= 0) {
        document.getElementById('quizVoBtn').classList.add('playing');
        Voiceover.playQuiz(origIndex);
        const checkEnd = setInterval(() => {
          if (!Voiceover.isPlaying()) {
            document.getElementById('quizVoBtn').classList.remove('playing');
            clearInterval(checkEnd);
          }
        }, 300);
      }
    }

    function checkAnswer(selected) {
      if (answering) return;
      answering = true;
      Voiceover.stop();
      const q = quizQuestions[currentQuestionIndex];
      const buttons = document.querySelectorAll('.quiz-option');
      const feedback = document.getElementById('quizFeedback');

      buttons.forEach(b => b.disabled = true);

      if (selected === q.correct) {
        score++;
        buttons[selected].classList.add('correct');
        feedback.className = 'quiz-feedback correct';
        feedback.textContent = getCorrectMessage();
        SFX.correct();
      } else {
        buttons[selected].classList.add('wrong');
        buttons[q.correct].classList.add('reveal-correct');
        feedback.className = 'quiz-feedback wrong';
        feedback.textContent = q.explanation;
        SFX.wrong();
      }
      feedback.style.display = 'flex';

      document.getElementById('quizNextBtn').style.display = 'inline-block';
    }

    function advanceQuestion() {
      document.getElementById('quizNextBtn').style.display = 'none';
      currentQuestionIndex++;
      answering = false;
      if (currentQuestionIndex < quizQuestions.length) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function getCorrectMessage() {
      const messages = T('correctMessages');
      return messages[Math.floor(Math.random() * messages.length)];
    }

    function showResults() {
      const total = quizQuestions.length;
      let stars;
      if (score >= 8) stars = 3;
      else if (score >= 4) stars = 2;
      else stars = 1;

      document.getElementById('resultsTitle').textContent = T('resultTitles')[stars];
      document.getElementById('resultsMessage').textContent = T('resultMessages')[stars];
      document.getElementById('resultsScore').textContent = T('scoreOf')(score, total);

      // Animate stars
      const starEls = document.querySelectorAll('.result-star');
      starEls.forEach((el, i) => {
        el.classList.remove('earned');
        el.style.animationDelay = `${i * 0.2}s`;
      });

      showScreen('screen-results');

      // Stagger star animation + sounds
      SFX.fanfare();
      setTimeout(() => {
        starEls.forEach((el, i) => {
          if (i < stars) {
            setTimeout(() => { el.classList.add('earned'); SFX.star(); }, i * 300);
          }
        });
      }, 200);

      // Fill progress bar to 100%
      document.getElementById('quizProgressFill').style.width = '100%';
    }

    // === VOICEOVER CONTROLS ===
    let voProgressInterval = null;

    function toggleVoiceover(index, btn) {
      SFX.click();
      // If this one is already playing, stop it
      if (btn.classList.contains('playing')) {
        stopVoiceover(index, btn);
        return;
      }

      // Stop any other playing voiceover
      document.querySelectorAll('.voiceover-btn.playing').forEach(b => {
        const idx = parseInt(b.id.replace('vo-btn-', ''));
        stopVoiceover(idx, b);
      });

      // Start playing
      const audio = Voiceover.play(index);
      if (!audio) return;

      btn.classList.add('playing');
      btn.querySelector('.vo-icon').textContent = '⏹';
      btn.querySelector('.vo-icon').nextSibling.textContent = ' ' + T('stop');

      const progress = document.getElementById('vo-progress-' + index);
      const fill = document.getElementById('vo-fill-' + index);
      progress.classList.add('active');

      // Update progress bar
      if (voProgressInterval) clearInterval(voProgressInterval);
      voProgressInterval = setInterval(() => {
        if (audio.duration) {
          fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        }
      }, 200);

      // When audio ends
      audio.onended = () => {
        stopVoiceover(index, btn);
      };
    }

    function stopVoiceover(index, btn) {
      Voiceover.stop();
      if (voProgressInterval) { clearInterval(voProgressInterval); voProgressInterval = null; }
      btn.classList.remove('playing');
      btn.querySelector('.vo-icon').textContent = '🔊';
      btn.querySelector('.vo-icon').nextSibling.textContent = ' ' + T('listen');
      const progress = document.getElementById('vo-progress-' + index);
      const fill = document.getElementById('vo-fill-' + index);
      if (progress) progress.classList.remove('active');
      if (fill) fill.style.width = '0%';
    }

    // === BACKGROUND STARS ===
    function createBgStars() {
      const container = document.getElementById('bgStars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'bg-star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.width = (Math.random() * 3 + 1) + 'px';
        star.style.height = star.style.width;
        container.appendChild(star);
      }
    }

    // === INIT ===
    createBgStars();
    renderTopics();

    // === PWA SERVICE WORKER ===
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
